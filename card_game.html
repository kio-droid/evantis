function selectNullify(key) {
  closeModal();
  G.nullifyChosen = key;
  addLog(`⚡ 全能神ゼウス：「${key === 'attack' ? '攻撃' : key === 'evolve' ? '進化' : key === 'swap' ? '交換' : '能力カード'}」を無効化！`, 'log-evolve');
  if (window._nullifyCallback) window._nullifyCallback();
}

function doAttack(who) {
  if (G.gameOver) return;
  const self = G[who];
  const opp  = G[who === 'player' ? 'cpu' : 'player'];
  if (!self.main || !opp.main) return;

  // 全能神ゼウスの攻撃無効チェック（mainのみ）
  if (G.nullifyChosen === 'attack' && hasAlmightyZeusMain(who === 'player' ? 'cpu' : 'player')) {
    addLog(`⚡ 全能神ゼウスが攻撃を無効化！`, 'log-evolve');
    G.nullifyChosen = null;
    G.attacksThisTurn++;
    if (who === 'player') G.hasAttacked = true;
    return;
  }

  const aresBonus = self.main.evolveEffect === 'ares_bonus' ? ARES_BONUS : 0;
  const dmg = self.main.atk + aresBonus;
  if (opp.shielded) {
    opp.shielded = false;
    addLog(`🛡️ ${who === 'player' ? 'CPUの' : 'あなたの'}シールド発動！攻撃を無効化！`, 'log-evolve');
    if (who === 'player') {
      G.attacksThisTurn++;
      const evolvedCMain = self.main && self.main.evolveEffect === 'double_attack';
      if (!evolvedCMain) G.hasAttacked = G.attacksThisTurn >= G.maxAttacksThisTurn;
    } else {
      G.hasAttacked = true;
    }
    return;
  }
  opp.main.hp = clamp(opp.main.hp - dmg, 0, opp.main.maxHP);
  if (aresBonus > 0) showCpuAction('⚔️', `軍神の力！ATK+${aresBonus}`, 'attack', null);
  const dmgLabel = aresBonus > 0 ? `${dmg}（ATK${self.main.atk}+ボーナス${aresBonus}）` : `${dmg}`;
  addLog(`⚔ ${who === 'player' ? 'あなたの' : 'CPUの'}${self.main.type}(ATK:${dmgLabel}) → ${who === 'player' ? 'CPUの' : 'あなたの'}${opp.main.type}に${dmg}ダメージ（残HP: ${opp.main.hp}）`, 'log-damage');

  if (opp.main && opp.main.evolveEffect === 'reflect') {
    const ref = Math.floor(dmg / 2);
    self.main.hp = clamp(self.main.hp - ref, 0, self.main.maxHP);
    addLog(`⚡ ${who === 'player' ? 'CPUの' : 'あなたの'}${opp.main.type}（E進化）が${ref}ダメージを反射！（${self.main.type}残HP: ${self.main.hp}）`, 'log-damage');
    checkMonsterDestroyed(who, who === 'player' ? 'cpu' : 'player');
    if (G.gameOver) return;
  }

  checkMonsterDestroyed(who === 'player' ? 'cpu' : 'player', who);

  if (who === 'player') {
    G.attacksThisTurn++;
    const evolvedCMain = self.main && self.main.evolveEffect === 'double_attack';
    if (!evolvedCMain) {
      G.hasAttacked = G.attacksThisTurn >= G.maxAttacksThisTurn;
    }
  } else {
    const evolvedCCPU = self.main && self.main.evolveEffect === 'double_attack';
    if (!evolvedCCPU) {
      G.hasAttacked = true;
    }
  }
}

function applyWaveDamage(who) {
  if (G.gameOver) return;
  const self = G[who];
  if (!self.main || self.main.evolveEffect !== 'wave') return;
  const opp = G[who === 'player' ? 'cpu' : 'player'];
  if (!opp.main) return;
  opp.main.hp = clamp(opp.main.hp - WAVE_DMG, 0, opp.main.maxHP);
  addLog(`🌊 ${who === 'player' ? 'あなたの' : 'CPUの'}波涛：${opp.main.label || opp.main.type}に${WAVE_DMG}ダメージ（残HP: ${opp.main.hp}）`, 'log-damage');
  // ポップアップ＆エフェクト
  showFX('wave');
  showCpuAction('🌊', `波涛ダメージ！−${WAVE_DMG}`, 'wave', null);
  const waveTargetFieldId = who === 'player' ? 'cpu-field' : 'player-field';
  setTimeout(() => {
    const waveCard = document.getElementById(waveTargetFieldId)?.querySelector('.main-battle-card');
    if (waveCard) { waveCard.classList.add('card-shake'); setTimeout(() => waveCard.classList.remove('card-shake'), 600); }
  }, 50);
  checkMonsterDestroyed(who === 'player' ? 'cpu' : 'player', who);
}

function playerEndTurn() {
  if (_popupBusy) return;
  if (G.activePlayer !== 'player' || G.gameOver) return;
  const evolvedCMain = G.player.main && G.player.main.evolveEffect === 'double_attack';
  if (evolvedCMain && G.attacksThisTurn === 1 && !G.abilityUsed) {
    addLog('⚠️ C進化：1回のみ攻撃は不可！もう1回攻撃してください。（または攻撃を0回でターン終了）', 'log-warn');
    return;
  }
  G.extraAttack = false;
  endPlayerTurn();
}

function endPlayerTurn() {
  // 波涛ダメージ（プレイヤーメインがwave効果を持つ場合）
  applyWaveDamage('player');
  if (G.gameOver) { render(); return; }

  if (G.mode === 'online') {
    // オンラインモード：相手にend_turnを送り、相手のターンへ
    drawAbility('player'); // 自分がカードドロー
    sendOnlineAction({ action: 'end_turn' });
    G.hasAttacked = false; G.abilityUsed = false; G.extraAttack = false;
    G.attacksThisTurn = 0; G.maxAttacksThisTurn = 1;
    G.evolvedThisTurn = false; G.swappedThisTurn = false; G.attackBlocked = false;
    G.myTurn = false;
    G.activePlayer = 'cpu';
    G.phase = 'ability';
    addLog('--- 相手のターン ---', 'log-system');
    render();
    return;
  }

  // ソロモード（CPU）
  G.hasAttacked = false;
  G.abilityUsed = false;
  G.extraAttack = false;
  G.attacksThisTurn = 0;
  G.maxAttacksThisTurn = 1;
  G.evolvedThisTurn = false;
  G.swappedThisTurn = false;
  G.attackBlocked = false;
  G.nullifyChosen = null;
  G.player.fushiActive = false; // 不死リセット
  G.activePlayer = 'cpu';
  G.phase = 'ability';
  G.turn++;
  addLog('--- CPUのターン ---', 'log-system');

  ['btn-attack','btn-end'].forEach(id => document.getElementById(id).disabled = true);
  document.getElementById('cpu-thinking').style.display = 'inline-block';
  render();
  showTurnBanner('cpu', `ラウンド ${Math.ceil(G.turn / 2)}`);

  drawAbilityAtTurnStart('cpu');

  // 全能神ゼウスがプレイヤーのmainにいる → CPUターン開始前に無効化選択ダイアログ
  if (hasAlmightyZeusMain('player')) {
    setTimeout(() => {
      showNullifyDialog(() => {
        setTimeout(() => cpuAct(), 400);
      });
    }, 900);
  } else {
    setTimeout(() => cpuAct(), 800);
  }
}

// ===================================================
// CPU AI
// ===================================================
function cpuAct() {
  if (G.gameOver) return;
  const cpu = G.cpu;
  const hand = cpu.hand;
  const mainHPRatio = cpu.main ? cpu.main.hp / cpu.main.maxHP : 1;
  const evolvedCCPU = cpu.main && cpu.main.evolveEffect === 'double_attack';

  // ===== 難易度別行動決定 =====
  const diff = cpuDifficulty;
  const mainRatio = cpu.main ? cpu.main.hp / cpu.main.maxHP : 1;
  const subRatio  = cpu.sub  ? cpu.sub.hp  / cpu.sub.maxHP  : 0;

  // 進化判断
  let willEvolve = false;
  let cpuEvolveKey = null;
  if (!G.evolvedThisTurn && cpu.sub && !cpu.sub.evolved && G.cpu.evolvedTotal < 2) {
    if (cpu.sub.type === 'Z') {
      // 常に怠け者ゼウスに進化（超進化はcheckZeusAscensionが自動処理）
      cpuEvolveKey = 'Z_lazy';
      willEvolve = true;
    } else {
      if (cpuMode === 'god') {
        // ゼウスが生きてる間は進化枠を1つ確保（全能神用）
        const zeusAlive = [cpu.main, cpu.sub, ...cpu.monsterDeck].some(m => m && m.type === 'Z');
        const nonZeusLimit = zeusAlive ? 1 : 2;
        willEvolve = G.cpu.evolvedTotal < nonZeusLimit && mainRatio > 0.4;
      } else {
        if (diff === 'easy')   willEvolve = Math.random() < 0.3;
        if (diff === 'normal') willEvolve = true;
        if (diff === 'hard')   willEvolve = mainRatio > 0.4;
      }
    }
  }

  // 交換判断
  let willSwap = false;
  if (!G.swappedThisTurn && cpu.sub) {
    if (diff === 'easy')   willSwap = mainRatio < 0.2 && Math.random() < 0.4; // HP極低でも低確率
    if (diff === 'normal') willSwap = mainRatio < 0.35 && subRatio > mainRatio + 0.2;
    if (diff === 'hard')   willSwap = mainRatio < 0.45 && subRatio > mainRatio + 0.15; // 早めに交換
  }

  const willDHeal = cpu.main && cpu.main.evolveEffect === 'd_heal' && cpu.main.dHealAvailable && mainHPRatio < 0.5;

  // 能力カード選択
  const attackWillBeBlocked = willSwap || willEvolve; // 進化・交換時は攻撃できないので追加攻撃カードを使わない
  const mainNeedsHeal = cpu.main && cpu.main.hp < cpu.main.maxHP; // HP満タン時は回復しない
  // 封印されていないカードのみ選択可能
  const findCard = (id) => hand.findIndex((c, i) => c === id && !cpu.sealedIndices.has(i));
  const hasCard  = (id) => findCard(id) >= 0;
  let playIdx = -1;

  if (cpuMode === 'god') {
    // ===== 神デッキ専用AI =====
    const aresIsMain    = cpu.main && cpu.main.evolveEffect === 'ares_bonus';
    const hestiaIsMain  = cpu.main && cpu.main.evolveEffect === 'regen';
    // アレス/ヘスティアが進化済みかどうか（メイン or サブに存在）
    const aresEvolved   = aresIsMain || (cpu.sub && cpu.sub.evolveEffect === 'ares_bonus');
    const hestiaEvolved = hestiaIsMain || (cpu.sub && cpu.sub.evolveEffect === 'regen');
    const oppMain = G.player.main;
    const oppHPRatio = oppMain ? oppMain.hp / oppMain.maxHP : 1;

    // シールド：HP半分以下で積極的に張る
    if (!evolvedCCPU && hasCard('shield') && mainHPRatio < 0.5 && Math.random() < 0.8) {
      playIdx = findCard('shield');
    }
    // 回復：ヘスティア進化済みならヘスティアがメインの時のみ使う。未進化なら通常使用
    if (playIdx < 0 && mainHPRatio < 0.5 && !evolvedCCPU && !willSwap && mainNeedsHeal) {
      if (!hestiaEvolved || hestiaIsMain) {
        let hi = findCard('heal_main');
        if (hi >= 0) playIdx = hi;
        if (playIdx < 0) { hi = findCard('heal_all'); if (hi >= 0) playIdx = hi; }
      }
    }
    // direct_damage：相手HPが低い時に止めを刺す
    if (playIdx < 0 && !evolvedCCPU && oppHPRatio < 0.65 && hasCard('direct_damage')) {
      playIdx = findCard('direct_damage');
    }
    // extra_attack：アレス進化済みならアレスがメインの時のみ使う。未進化なら通常使用
    if (playIdx < 0 && !evolvedCCPU && !attackWillBeBlocked) {
      if (!aresEvolved || aresIsMain) {
        const ei = findCard('extra_attack');
        if (ei >= 0) playIdx = ei;
      }
    }
    // 不死：神メインのHPが低い時に使う
    if (playIdx < 0 && cpu.main && cpu.main.category === '神' && mainHPRatio < 0.35 && !cpu.fushiActive && hasCard('fushi')) {
      playIdx = findCard('fushi');
    }
    // fuuin：相手手札が多い時に封印
    if (playIdx < 0 && !evolvedCCPU && G.player.hand.length >= 3 && hasCard('fuuin') && Math.random() < 0.6) {
      playIdx = findCard('fuuin');
    }
    // kaishuu：手札が少なく捨て札がある時
    if (playIdx < 0 && cpu.discardPile.length > 0 && hand.length <= 2 && hasCard('kaishuu')) {
      playIdx = findCard('kaishuu');
    }
    // swap_enemy：相手のメインHPが高く、サブが弱い状況で揺さぶる
    if (playIdx < 0 && !evolvedCCPU && hasCard('swap_enemy') && Math.random() < 0.5) {
      playIdx = findCard('swap_enemy');
    }
    // direct_damage残り
    if (playIdx < 0 && !evolvedCCPU) {
      const di = findCard('direct_damage');
      if (di >= 0) playIdx = di;
    }
  } else if (diff === 'easy') {
    // 弱い：30%でランダムに使う（extra_attackは攻撃できない時は除外、封印も除外）
    if (Math.random() < 0.3) {
      const valid = hand.map((c, i) => ({ c, i }))
        .filter(({ c, i }) => !ABILITY_DEFS[c].disabled && !cpu.sealedIndices.has(i) && (!attackWillBeBlocked || c !== 'extra_attack'));
      if (valid.length > 0) playIdx = valid[Math.floor(Math.random() * valid.length)].i;
    }
  } else if (diff === 'normal') {
    if (mainHPRatio < 0.35 && !evolvedCCPU && !willSwap && mainNeedsHeal) {
      let hi = findCard('heal_main');
      if (hi >= 0) playIdx = hi;
      if (playIdx < 0) { hi = findCard('heal_all'); if (hi >= 0) playIdx = hi; }
    }
    if (playIdx < 0 && !evolvedCCPU) {
      const di = findCard('direct_damage');
      if (di >= 0) playIdx = di;
    }
    if (playIdx < 0 && !evolvedCCPU && Math.random() < 0.45) {
      const valid = hand.map((c, i) => ({ c, i }))
        .filter(({ c, i }) => !ABILITY_DEFS[c].disabled && !cpu.sealedIndices.has(i) && (!attackWillBeBlocked || c !== 'extra_attack'));
      if (valid.length > 0) playIdx = valid[Math.floor(Math.random() * valid.length)].i;
    }
  } else { // hard
    // 強い：HP管理優先、シールド活用、direct_damage積極使用
    const oppMain = G.player.main;
    const oppHPRatio = oppMain ? oppMain.hp / oppMain.maxHP : 1;
    // シールドを相手の攻撃前に張る
    if (!evolvedCCPU && hasCard('shield') && mainHPRatio < 0.5 && Math.random() < 0.7) {
      playIdx = findCard('shield');
    }
    if (playIdx < 0 && mainHPRatio < 0.5 && !evolvedCCPU && !willSwap && mainNeedsHeal) {
      let hi = findCard('heal_main');
      if (hi >= 0) playIdx = hi;
      if (playIdx < 0) { hi = findCard('heal_all'); if (hi >= 0) playIdx = hi; }
    }
    if (playIdx < 0 && !evolvedCCPU) {
      // 相手HPが低ければdirect_damageで止め
      if (oppHPRatio < 0.6 && hasCard('direct_damage')) playIdx = findCard('direct_damage');
    }
    if (playIdx < 0 && !evolvedCCPU) {
      const di = findCard('direct_damage');
      if (di >= 0) playIdx = di;
    }
    // 不死：神メインのHPが低い時に使う
    if (playIdx < 0 && cpu.main && cpu.main.category === '神' && mainHPRatio < 0.35 && !cpu.fushiActive && hasCard('fushi')) {
      playIdx = findCard('fushi');
    }
    // fuuin：相手手札が多い時
    if (playIdx < 0 && !evolvedCCPU && G.player.hand.length >= 3 && hasCard('fuuin') && Math.random() < 0.5) {
      playIdx = findCard('fuuin');
    }
    // kaishuu：手札が少なく捨て札がある時
    if (playIdx < 0 && cpu.discardPile.length > 0 && hand.length <= 2 && hasCard('kaishuu')) {
      playIdx = findCard('kaishuu');
    }
    if (playIdx < 0 && !evolvedCCPU && Math.random() < 0.7) {
      // extra_attackは攻撃できない（進化・交換済み）場合は除外
      const priority = ['extra_attack', 'direct_damage', 'swap_enemy', 'fuuin', 'heal_main', 'heal_all']
        .filter(c => !attackWillBeBlocked || c !== 'extra_attack');
      for (const p of priority) {
        const i = findCard(p);
        if (i >= 0) { playIdx = i; break; }
      }
    }
  }

  // ===== 順番実行ステップを構築 =====
  const steps = [];

  // ① 進化
  if (willEvolve) {
    steps.push(next => {
      const prevType = cpu.sub.type;
      // nullify無効化チェック（進化）
      if (G.nullifyChosen === 'evolve' && hasAlmightyZeusMain('player')) {
        addLog(`⚡ 全能神ゼウスがCPUの進化を無効化！`, 'log-evolve');
        G.nullifyChosen = null;
        G.evolvedThisTurn = true; G.attackBlocked = true;
        render(); next(); return;
      }
      showCpuAction('✨', `CPUのサブが進化する！`, 'evolve', () => {
        if (G.gameOver) { next(); return; }
        evolveMonster(cpu.sub, cpuEvolveKey);
        G.evolvedThisTurn = true;
        G.attackBlocked = true;
        G.cpu.evolvedTotal++;
        const usedKey = cpuEvolveKey || prevType;
        addLog(`✨ CPUの${prevType}（サブ）が進化！→ ${cpu.sub.label}　HP:${cpu.sub.hp}/${cpu.sub.maxHP}　ATK:${cpu.sub.atk}`, 'log-evolve');
        addLog(`  → 進化効果: ${EVOLVE_DEFS[usedKey]?.effectDesc || ''}`, 'log-evolve');
        showFX('evolve');
        render();
        next();
      });
    });
  }

  // ② 交換（進化していない場合のみ）
  if (willSwap && !willEvolve) {
    steps.push(next => {
      // nullify無効化チェック（交換）
      if (G.nullifyChosen === 'swap' && hasAlmightyZeusMain('player')) {
        addLog(`⚡ 全能神ゼウスがCPUの交換を無効化！`, 'log-evolve');
        G.nullifyChosen = null;
        G.swappedThisTurn = true; G.attackBlocked = true;
        render(); next(); return;
      }
      showCpuAction('🔄', `CPUがメイン⇔サブを交換！`, 'ability', () => {
        if (G.gameOver) { next(); return; }
        [cpu.main, cpu.sub] = [cpu.sub, cpu.main];
        G.swappedThisTurn = true;
        G.attackBlocked = true;
        addLog(`🔄 CPUがメイン⇔サブを交換（このターン攻撃不可）`, 'log-system');
        render();
        next();
      });
    });
  }

  // ③ 回復スキル（D進化）
  if (willDHeal) {
    steps.push(next => {
      showCpuAction('💧', `CPUがHP回復！`, 'heal', () => {
        if (G.gameOver) { next(); return; }
        cpuDHeal();
        render();
        next();
      });
    });
  }

  // ③ 能力カード
  if (playIdx >= 0) {
    const cardId = hand[playIdx];
    const def    = ABILITY_DEFS[cardId];
    const theme  = CARD_THEMES[cardId] || { icon: '🃏' };
    const typeMap = { heal_main:'heal', heal_all:'heal', direct_damage:'attack', swap_enemy:'ability', extra_attack:'attack', monster_select:'ability', shuffle_enemy:'ability' };
    steps.push(next => {
      showCpuAction(theme.icon, `CPUが「${def.name}」を使用！`, typeMap[cardId] || 'ability', () => {
        if (G.gameOver) { next(); return; }
        // nullify無効化チェック（能力カード）
        if (G.nullifyChosen === 'ability' && hasAlmightyZeusMain('player')) {
          addLog(`⚡ 全能神ゼウスがCPUの「${def.name}」を無効化！`, 'log-evolve');
          G.nullifyChosen = null;
          const ci2 = G.cpu.hand.indexOf(cardId);
          if (ci2 >= 0) G.cpu.hand.splice(ci2, 1); // カードは消費
          render(); next(); return;
        }
        const ci = G.cpu.hand.indexOf(cardId);
        if (ci >= 0) {
          if (cardId === 'monster_select' && cpu.monsterDeck.length > 0) {
            cpu.monsterDeck.sort((a, b) => b.atk - a.atk);
            G.cpu.hand.splice(ci, 1);
            addLog(`CPUが「モンスター指定」：次のモンスターを指定`, '');
          } else {
            applyAbilityCard('cpu', cardId, ci, () => {});
          }
          render();
        }
        next();
      });
    });
  }

  // ④ 攻撃（進化・交換した場合はスキップ）
  steps.push(next => {
    if (G.gameOver || G.attackBlocked) { next(); return; }
    const isDoubleAtk = G.cpu.main && G.cpu.main.evolveEffect === 'double_attack';
    const atk = G.cpu.main ? G.cpu.main.atk : '?';
    showCpuAction('⚔️', isDoubleAtk ? `CPUが2回攻撃！${atk}×2ダメージ` : `CPUが攻撃！${atk}ダメージ`, 'attack', () => {
      if (G.gameOver) { next(); return; }
      if (isDoubleAtk) {
        doAttack('cpu'); render(); if (!G.gameOver) showAttackFX('player');
        if (!G.gameOver) setTimeout(() => {
          doAttack('cpu'); render(); if (!G.gameOver) showAttackFX('player');
          next();
        }, 700);
      } else {
        const doSecond = G.maxAttacksThisTurn >= 2;
        // 1回目攻撃（render+FX付き）
        doAttack('cpu'); render(); if (!G.gameOver) showAttackFX('player');
        if (!G.gameOver && doSecond) {
          // キュードレイン後に追加攻撃ポップアップを出す
          showCpuAction('', '', 'attack', () => {
            if (G.gameOver) { next(); return; }
            const atk2 = G.cpu.main ? G.cpu.main.atk : '?';
            showCpuAction('⚔️', `CPUが追加攻撃！${atk2}ダメージ`, 'attack', () => {
              if (G.gameOver) { next(); return; }
              doAttack('cpu'); render(); if (!G.gameOver) showAttackFX('player');
              showCpuAction('', '', 'attack', next);
            });
          });
        } else {
          next();
        }
      }
    });
  });

  // ===== 順番に実行 =====
  function runSteps(i) {
    if (G.gameOver) { endCpuTurn(); return; }
    if (i >= steps.length) { setTimeout(() => endCpuTurn(), 400); return; }
    steps[i](() => runSteps(i + 1));
  }
  runSteps(0);
}

function cpuDHeal() {
  if (!G.cpu.main || !G.cpu.main.dHealAvailable) return;
  let target = G.cpu.main;
  if (G.cpu.sub && G.cpu.sub.hp / G.cpu.sub.maxHP < G.cpu.main.hp / G.cpu.main.maxHP) {
    target = G.cpu.sub;
  }
  const before = target.hp;
  target.hp = clamp(target.hp + EVOLVE_D_HEAL, 0, target.maxHP);
  G.cpu.main.dHealAvailable = false;
  addLog(`💧 CPUのD進化スキル：${target.type}を+${target.hp - before}回復（${target.hp}/${target.maxHP}）`, 'log-heal');
}


function endCpuTurn() {
  if (G.gameOver) return;
  // 波涛ダメージ（CPUメインがwave効果を持つ場合）
  applyWaveDamage('cpu');
  if (G.gameOver) { render(); return; }
  document.getElementById('cpu-thinking').style.display = 'none';
  G.hasAttacked = false;
  G.abilityUsed = false;
  G.extraAttack = false;
  G.attacksThisTurn = 0;
  G.maxAttacksThisTurn = 1;
  G.evolvedThisTurn = false;
  G.swappedThisTurn = false;
  G.attackBlocked = false;
  G.cpu.fushiActive = false; // 不死リセット

  const round = Math.ceil(G.turn / 2);
  if (round >= G.maxTurns) {
    const ps = G.player.destroyedCount, cs = G.cpu.destroyedCount;
    if (ps > cs) endGame('player', `25ターン終了（破壊数: あなた${ps} / CPU${cs}）`);
    else if (cs > ps) endGame('cpu', `25ターン終了（破壊数: あなた${ps} / CPU${cs}）`);
    else endGame(null, `25ターン終了（引き分け！ 破壊数: ${ps}）`);
    return;
  }

  G.activePlayer = 'player';
  G.phase = 'ability';
  G.turn++;
  addLog(`--- あなたのターン（ラウンド ${Math.ceil(G.turn / 2)}）---`, 'log-system');
  drawAbilityAtTurnStart('player');
  render();
  showTurnBanner('player', `ラウンド ${Math.ceil(G.turn / 2)}`);

  // 全能神ゼウスがCPUのmainにいる → プレイヤーターン開始時にCPUが自動で無効化選択
  if (hasAlmightyZeusMain('cpu')) {
    const canEvolve = G.player.sub && !G.player.sub.evolved;
    const hasHand   = G.player.hand.length > 0;
    // 優先度: 進化可能→進化無効、手札あり→能力無効、それ以外→攻撃無効
    let pick = 'attack';
    if (canEvolve && Math.random() < 0.5) pick = 'evolve';
    else if (hasHand && Math.random() < 0.4) pick = 'ability';
    G.nullifyChosen = pick;
    const pickLabel = pick === 'attack' ? '攻撃' : pick === 'evolve' ? '進化' : pick === 'ability' ? '能力カード' : '交換';
    addLog(`⚡ 全能神ゼウス（CPU）：あなたの「${pickLabel}」を無効化！`, 'log-evolve');
    setTimeout(() => {
      showCpuAction('⚡', `全能神ゼウスの加護！`, 'evolve', null);
    }, 500);
  }
}

// ===================================================
// WIN / LOSE
// ===================================================
function endGame(winner, reason) {
  G.gameOver = true;
  G.winner = winner;
  G.phase = 'gameover';
  document.getElementById('cpu-thinking').style.display = 'none';

  const overlay = document.getElementById('gameover-overlay');
  const title   = document.getElementById('gameover-title');
  const detail  = document.getElementById('gameover-detail');

  if (winner === 'player') {
    title.textContent = '🎉 あなたの勝利！';
    title.style.color = '#ffd166';
  } else if (winner === 'cpu') {
    title.textContent = '💀 CPUの勝利';
    title.style.color = '#ff6b6b';
  } else {
    title.textContent = '🤝 引き分け';
    title.style.color = '#aaa';
  }
  detail.textContent = reason;
  // 神デッキ撃破ボーナス
  const packEl = document.getElementById('pack-reward');
  if (packEl) packEl.style.display = (winner === 'player' && cpuMode === 'god') ? 'block' : 'none';
  overlay.classList.add('show');
  render();
}

// ===================================================
// LOG
// ===================================================
function addLog(msg, cls) {
  const logEl = document.getElementById('log-zone');
  const p = document.createElement('p');
  if (cls) p.className = cls;
  p.textContent = msg;
  logEl.appendChild(p);
  if (logEl.style.display !== 'none') logEl.scrollTop = logEl.scrollHeight;
}

// ===================================================
// VISUAL EFFECTS
// ===================================================
function spawnParticle(parent, cx, cy, dx, dy, color, size, duration, delay) {
  const el = document.createElement('div');
  el.style.cssText = `position:absolute;left:${cx};top:${cy};width:${size}px;height:${size}px;border-radius:50%;background:${color};transform:translate(-50%,-50%);opacity:1;`;
  parent.appendChild(el);
  setTimeout(() => {
    const start = performance.now();
    function frame(now) {
      const t = Math.min((now - start) / duration, 1);
      const e = 1 - Math.pow(1 - t, 2);
      el.style.transform = `translate(calc(-50% + ${dx*e}px), calc(-50% + ${dy*e}px)) scale(${1-t*0.5})`;
      el.style.opacity = String(1 - t);
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }, delay || 0);
}

function showFX(type) {
  const ov = document.getElementById('fx-overlay');
  ov.innerHTML = '';

  if (type === 'attack') {
    // 赤いスラッシュライン × 3
    for (let i = 0; i < 3; i++) {
      const s = document.createElement('div');
      const rot = -10 + i * 7;
      s.style.cssText = `position:absolute;left:-5%;width:110%;height:${2+i*1.5}px;top:${28+i*20}%;
        background:linear-gradient(90deg,transparent,rgba(255,50,50,0.9) 40%,rgba(255,230,230,1) 50%,rgba(255,50,50,0.9) 60%,transparent);
        --r:${rot}deg;animation:fx-slash 0.38s ${i*0.07}s ease-out both;`;
      ov.appendChild(s);
    }
    // 赤フラッシュ
    const bg = document.createElement('div');
    bg.style.cssText = `position:absolute;inset:0;background:rgba(200,20,20,0.18);animation:fx-flash 0.35s ease-out both;`;
    ov.appendChild(bg);

  } else if (type === 'evolve') {
    // 紫ラジアルグロー
    const bg = document.createElement('div');
    bg.style.cssText = `position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(160,80,255,0.5),transparent 65%);animation:fx-flash 0.9s ease-out both;`;
    ov.appendChild(bg);
    // 拡大リング × 6
    for (let i = 0; i < 6; i++) {
      const r = document.createElement('div');
      r.style.cssText = `position:absolute;top:50%;left:50%;width:70px;height:70px;border-radius:50%;
        border:${3-i*0.3}px solid rgba(210,130,255,${0.9-i*0.1});
        animation:fx-ring 1.0s ${i*0.1}s ease-out both;`;
      ov.appendChild(r);
    }
    // パーティクル × 14
    for (let i = 0; i < 14; i++) {
      const angle = (i/14)*Math.PI*2;
      const dist = 70 + Math.random()*60;
      spawnParticle(ov,'50%','50%', Math.cos(angle)*dist, Math.sin(angle)*dist,
        i%2===0?'#c9a0ff':'#ffffff', 4+Math.random()*5, 700+i*30, i*30);
    }

  } else if (type === 'ability') {
    // ゴールドグロー
    const bg = document.createElement('div');
    bg.style.cssText = `position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(255,209,102,0.3),transparent 60%);animation:fx-flash 0.5s ease-out both;`;
    ov.appendChild(bg);
    // パーティクル × 12
    for (let i = 0; i < 12; i++) {
      const angle = (i/12)*Math.PI*2;
      const dist = 50 + Math.random()*70;
      spawnParticle(ov,'50%','50%', Math.cos(angle)*dist, Math.sin(angle)*dist,
        i%3===0?'#ffffff':'#ffd166', 4+Math.random()*5, 550+i*25, i*25);
    }

  } else if (type === 'wave') {
    // 後ろの深海層（暗い青）
    const deep = document.createElement('div');
    deep.style.cssText = `position:absolute;bottom:0;left:0;width:100%;height:75%;
      background:linear-gradient(180deg,rgba(5,30,90,0) 0%,rgba(5,30,90,0.55) 40%,rgba(8,40,120,0.7) 100%);
      animation:fx-wave-rise 1.1s ease-in-out both;`;
    ov.appendChild(deep);

    // メイン波の壁（3層）
    const waveColors = [
      { bg:'linear-gradient(180deg,rgba(20,120,220,0.92) 0%,rgba(10,60,160,0.85) 60%,rgba(5,30,100,0.75) 100%)', delay:'0s', h:'70%' },
      { bg:'linear-gradient(180deg,rgba(40,160,240,0.8) 0%,rgba(20,100,200,0.75) 60%,transparent 100%)',          delay:'0.06s', h:'60%' },
      { bg:'linear-gradient(180deg,rgba(80,200,255,0.6) 0%,rgba(40,140,220,0.5) 50%,transparent 100%)',           delay:'0.12s', h:'50%' },
    ];
    waveColors.forEach(({ bg, delay, h }) => {
      const w = document.createElement('div');
      // clip-path で波形クレスト
      w.style.cssText = `position:absolute;bottom:0;left:-2%;width:104%;height:${h};
        background:${bg};
        clip-path:polygon(0% 14%,5% 8%,12% 13%,20% 5%,28% 12%,37% 3%,46% 11%,55% 2%,64% 10%,73% 4%,82% 12%,90% 5%,97% 10%,100% 8%,100% 100%,0% 100%);
        animation:fx-wave-rise 1.1s ${delay} ease-in-out both;`;
      ov.appendChild(w);
    });

    // クレスト白泡（波頭）
    for (let i = 0; i < 3; i++) {
      const foam = document.createElement('div');
      const left = 15 + i * 30 + Math.random() * 10;
      foam.style.cssText = `position:absolute;bottom:calc(${['70%','60%','50%'][i]} - 4px);left:${left}%;
        width:${40 + Math.random() * 30}px;height:8px;
        background:rgba(255,255,255,0.9);border-radius:50%;
        filter:blur(2px);
        animation:fx-foam-pop 0.5s ${0.3 + i*0.08}s ease-out both;`;
      ov.appendChild(foam);
    }

    // 青フラッシュ
    const bg = document.createElement('div');
    bg.style.cssText = `position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,rgba(0,100,220,0.25),transparent 70%);animation:fx-flash 1.0s ease-out both;`;
    ov.appendChild(bg);

    // 水しぶきパーティクル（クレストから弾け飛ぶ）
    for (let i = 0; i < 20; i++) {
      const x = 10 + Math.random() * 80;
      const dy = -(40 + Math.random() * 80);
      const dx = (Math.random() - 0.5) * 100;
      spawnParticle(ov, `${x}%`, '30%', dx, dy,
        i % 4 === 0 ? '#ffffff' : i % 4 === 1 ? '#b0eeff' : i % 4 === 2 ? '#60c8ff' : '#0090dd',
        2 + Math.random() * 4, 700 + i * 20, 200 + i * 30);
    }

  } else if (type === 'evolved-ability') {
    // シアングロー
    const bg = document.createElement('div');
    bg.style.cssText = `position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(40,200,230,0.35),transparent 60%);animation:fx-flash 0.6s ease-out both;`;
    ov.appendChild(bg);
    // 拡大リング × 4
    for (let i = 0; i < 4; i++) {
      const r = document.createElement('div');
      r.style.cssText = `position:absolute;top:50%;left:50%;width:55px;height:55px;border-radius:50%;
        border:2px solid rgba(60,220,255,${0.9-i*0.15});
        animation:fx-ring 0.75s ${i*0.12}s ease-out both;`;
      ov.appendChild(r);
    }
    // パーティクル × 10
    for (let i = 0; i < 10; i++) {
      const angle = (i/10)*Math.PI*2;
      const dist = 45+Math.random()*55;
      spawnParticle(ov,'50%','50%', Math.cos(angle)*dist, Math.sin(angle)*dist,
        '#28d8f8', 4+Math.random()*4, 520+i*25, i*30);
    }
  } else if (type === 'zeus_ascend') {
    // 暗転（黒）
    const black = document.createElement('div');
    black.style.cssText = `position:absolute;inset:0;background:#000;animation:fx-zeus-dark 2.8s ease-out both;`;
    ov.appendChild(black);
    // 雷光ボルト × 6
    for (let i = 0; i < 6; i++) {
      const bolt = document.createElement('div');
      bolt.style.cssText = `position:absolute;left:${8+i*16}%;top:0;width:${1+Math.random()*2}px;height:100%;
        background:linear-gradient(180deg,rgba(255,230,80,1),rgba(255,255,200,0.6),transparent);
        transform-origin:top center;animation:fx-zeus-bolt 0.45s ${i*0.08}s ease-out both;`;
      ov.appendChild(bolt);
    }
    // ゴールドフラッシュ
    const gold = document.createElement('div');
    gold.style.cssText = `position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(255,210,50,0.55),transparent 65%);animation:fx-flash 0.8s 0.2s ease-out both;`;
    ov.appendChild(gold);
    // パーティクル × 24
    for (let i = 0; i < 24; i++) {
      const angle = (i/24)*Math.PI*2;
      const dist = 90 + Math.random()*110;
      spawnParticle(ov,'50%','45%', Math.cos(angle)*dist, Math.sin(angle)*dist,
        i%3===0?'#ffe066':i%3===1?'#ffffff':'#ffc820', 4+Math.random()*6, 900+i*25, 250+i*15);
    }
    setTimeout(() => { ov.innerHTML = ''; }, 3200);
    return;
  }

  setTimeout(() => { ov.innerHTML = ''; }, 1500);
}

function toggleLog() {
  const log = document.getElementById('log-zone');
  const btn = document.getElementById('log-toggle');
  const isOpen = log.style.display === 'block';
  log.style.display = isOpen ? 'none' : 'block';
  btn.textContent   = isOpen ? '▼ バトルログ' : '▲ バトルログ';
  if (!isOpen) log.scrollTop = log.scrollHeight;
}

// ===== RULES SCREEN =====
const RULES_IMAGES = [
  'images/How to Play/ru-ru1.jpg',
  'images/How to Play/ru-ru2.PNG',
  'images/How to Play/ru-ru3.PNG',
  'images/How to Play/ru-ru4.PNG',
  'images/How to Play/ru-ru5.JPEG',
];
let _rulesPage = 0;

function showRulesScreen() {
  _rulesPage = 0;
  document.getElementById('start-screen').style.display = 'none';
  const rs = document.getElementById('rules-screen');
  rs.style.display = 'flex';
  _updateRulesImg();
}

function _updateRulesImg() {
  document.getElementById('rules-img').src = RULES_IMAGES[_rulesPage];
  document.getElementById('rules-page').textContent = `${_rulesPage + 1} / ${RULES_IMAGES.length}`;
  document.getElementById('rules-prev').style.visibility = _rulesPage === 0 ? 'hidden' : 'visible';
  document.getElementById('rules-next').textContent = _rulesPage === RULES_IMAGES.length - 1 ? '✕ 閉じる' : '次へ ▶';
}

function rulesNav(dir) {
  if (dir === 1 && _rulesPage === RULES_IMAGES.length - 1) {
    document.getElementById('rules-screen').style.display = 'none';
    document.getElementById('start-screen').style.display = 'flex';
    return;
  }
  _rulesPage = Math.max(0, Math.min(RULES_IMAGES.length - 1, _rulesPage + dir));
  _updateRulesImg();
}

// ===== SPLASH SCREEN =====
(function() {
  const splash = document.getElementById('splash-screen');
  const startScreen = document.getElementById('start-screen');
  // ロゴフェードイン (300ms後に開始)
  setTimeout(() => splash.classList.add('logo-in'), 300);
  // フェードアウト開始 (ロゴ表示 1s + ホールド 1.2s = 2200ms)
  setTimeout(() => splash.classList.add('fade-out'), 2200);
  // スプラッシュ非表示＆スタート画面表示 (フェードアウト 0.6s後)
  setTimeout(() => {
    splash.style.display = 'none';
    startScreen.style.display = 'flex';
  }, 2800);
})();
